<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KMB ETA</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 20px;
}
h1 { text-align: center; }
.container {
    display: flex;
    flex-direction: column;
    gap: 15px;
}
.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.route {
    font-size: 22px;
    font-weight: bold;
}
.stop {
    color: #666;
    margin-top: 4px;
}
.eta {
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>KMB 到站時間</h1>
<div id="etaContainer" class="container"></div>

<script>
const routes = [
    { route: "11X", stop: "38C2E40346BA619E" },
    { route: "14",  stop: "E37FF663075361FE" },
    { route: "15",  stop: "8A25BDD80CA7201C" }
];

const stopCache = {};

// ✅ fetch stop name (Chinese)
async function fetchStopName(stopId) {
    if (stopCache[stopId]) return stopCache[stopId];

    try {
        const res = await fetch(
            `https://data.etabus.gov.hk/v1/transport/kmb/stop/${stopId}`
        );
        const data = await res.json();

        if (data.data) {
            const name = data.data.name_tc;
            stopCache[stopId] = name;
            return name;
        }
    } catch {}

    return stopId;
}

// ✅ detect correct direction + get ETA
async function detectAndFetchETA(r) {
    const url1 = `https://data.etabus.gov.hk/v1/transport/kmb/eta/${r.stop}/${r.route}/1`;
    const url2 = `https://data.etabus.gov.hk/v1/transport/kmb/eta/${r.stop}/${r.route}/2`;

    try {
        const [res1, res2] = await Promise.all([fetch(url1), fetch(url2)]);
        const data1 = await res1.json();
        const data2 = await res2.json();

        if (data1.data && data1.data.length > 0) {
            return data1.data; // ✅ correct direction
        }

        if (data2.data && data2.data.length > 0) {
            return data2.data;
        }

    } catch (e) {
        console.error(e);
    }

    return [];
}

// ✅ format ETA + countdown
function formatETA(etaTime) {
    const now = new Date();
    const eta = new Date(etaTime);

    const diffMin = Math.floor((eta - now) / 60000);

    let countdown;
    if (diffMin <= 0) countdown = "即將到達";
    else if (diffMin === 1) countdown = "1 分鐘";
    else countdown = diffMin + " 分鐘";

    return `${eta.toLocaleTimeString()} (${countdown})`;
}

// ✅ main render
async function updateETA() {
    const container = document.getElementById("etaContainer");
    container.innerHTML = "";

    for (const r of routes) {

        const etaData = await detectAndFetchETA(r);

        let routeName = r.route;
        let etas = ["沒有班次"];

        const stopName = await fetchStopName(r.stop);

        if (etaData.length > 0) {

            // ✅ ✅ CORRECT SOURCE OF TRUTH
            const dest = etaData[0].dest_tc;
            routeName = `往 ${dest}`;

            etas = etaData.slice(0, 3).map(e => {
                if (!e.eta) return "未定時間";
                return formatETA(e.eta);
            });
        }

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="route">${r.route} - ${routeName}</div>
            <div class="stop">📍 ${stopName}</div>
            <div class="eta">
                ${etas.map((t,i) =>
                    i===0
                        ? `<b style="color:green">• ${t}</b>`
                        : `• ${t}`
                ).join("<br>")}
            </div>
        `;

        container.appendChild(card);
    }
}

// ✅ start
updateETA();
setInterval(updateETA, 30000);
</script>

</body>
</html>
